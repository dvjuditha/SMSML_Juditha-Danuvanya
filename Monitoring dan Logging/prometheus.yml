global:
  scrape_interval: 10s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'ml_model_exporter'
    # Use host.docker.internal if running Grafana/Prometheus in docker and exporter on Mac host
    static_configs:
      - targets: ['host.docker.internal:8000']
